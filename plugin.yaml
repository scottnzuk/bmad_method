name: bmad_method
title: BMAD Method
version: 1.0.2
author: Vanja Emichi
description: |
  BMAD Method Framework for Agent Zero. Brings structured AI-assisted software
  development to Agent Zero through 20 specialist agent personas across 4 modules:
  BMM (Business Method Module) for full product lifecycle, BMB (Builder Module)
  for BMAD toolchain creation, TEA (Testing Excellence Accelerator) for test
  architecture and automation, and CIS (Creative Intelligence Suite) for ideation
  and creative workflows. Includes bundled workflow skills, project-scoped FAISS
  memory isolation, a phase-aware routing extension, and an interactive status dashboard.
