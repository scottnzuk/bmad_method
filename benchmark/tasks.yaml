# BMAD Benchmark Suite v2 — Protocol Compliance Focus
# Designed to discriminate between better/worse plugin configurations
# Each task has clear failure modes that agent.yaml/knowledge changes can fix

tasks:

  - id: task_01_routing_ambiguous
    agent: bmad-master
    weight: 1.5
    description: |
      Routing under ambiguity — tests if bmad-master uses structured phase logic
      or just guesses. A weak agent says 'maybe analyst or PM'. A strong agent
      explains the exact phase sequence with reasons.
    prompt: |
      I have a startup idea for an AI-powered grocery shopping assistant.
      I have SOME market research notes but NO formal product brief yet.
      I also have a rough tech idea (mobile app + ML backend).
      Where do I start and what exact sequence of BMAD agents should I use?
      I want the full roadmap from idea to first sprint.
    criteria:
      - Identifies Phase 1 (Analysis) as the mandatory starting point and names bmad-analyst (Mary)
      - Explains WHY Phase 1 must come before Phase 2 (can't write PRD without product brief)
      - Lists the full 4-phase sequence in order: Analysis → Planning → Solutioning → Implementation
      - Names the specific agents for each phase (Mary, John/Sally, Winston, Bob/Amelia/Quinn)
      - Provides at least one concrete trigger command (e.g. CB, BP, or equivalent action)

  - id: task_02_prd_critique
    agent: bmad-pm
    weight: 1.0
    description: |
      PRD validation with specific flaws — tests if bmad-pm can identify concrete
      problems in a flawed document, not just rubber-stamp it.
    prompt: |
      Please validate this PRD and identify ALL problems with it:

      ---
      # PRD: Task Manager App
      ## Overview
      Build a task manager app. Users should be able to create tasks.
      ## Features
      - Create tasks
      - Delete tasks
      - Maybe add due dates later
      ## Success
      App should be good and users should like it.
      ## Technical
      Use React.
      ---

      List every specific problem you find. Be critical and thorough.
    criteria:
      - Identifies missing user personas / target audience definition
      - Identifies that success metrics are unmeasurable ("good", "like it")
      - Identifies missing acceptance criteria or user stories
      - Identifies scope ambiguity ("maybe add due dates later" is not a decision)
      - Recommends specific next steps to fix the PRD (not just complains)

  - id: task_03_adr_format
    agent: bmad-architect
    weight: 1.0
    description: |
      ADR quality and format compliance — tests if architect produces properly
      structured ADRs with all required sections vs vague design notes.
    prompt: |
      We need to decide between REST and GraphQL for our new mobile app API.
      The app has: complex nested data (users → projects → tasks → comments),
      mobile clients that need offline sync, and a small team of 3 backend devs.
      Create a formal Architecture Decision Record for this choice.
      Include: context, decision, rationale, alternatives considered, and consequences.
    criteria:
      - Has a clear ADR title and status (e.g. "Accepted")
      - Context section explains the specific problem drivers (nested data, offline, team size)
      - Decision section states the chosen option explicitly (REST or GraphQL — either is fine)
      - Lists at least 2 alternatives with specific pros/cons for each
      - Consequences section covers BOTH positive and negative consequences of the decision

  - id: task_04_story_missing_context
    agent: bmad-sm
    weight: 1.0
    description: |
      Story creation when technical context is missing — tests if bmad-sm
      correctly identifies what it needs vs blindly producing a story.
      A weak agent produces a story full of assumptions. A strong agent
      notes what's missing and still produces the best possible story.
    prompt: |
      Create an implementation-ready user story for:
      'As a mobile user, I want to sync my tasks offline so I can work without internet.'
      Note: There is no existing architecture document or PRD for this project.
      Deliver the complete story including acceptance criteria and technical notes.
    criteria:
      - Delivers a complete user story in As a / I want / So that format
      - Includes at least 4 acceptance criteria in Given/When/Then format
      - Technical notes section explicitly flags what architecture decisions are assumed or missing
      - Story is marked with a status indicating it needs architecture review before implementation
      - Definition of Done checklist is included

  - id: task_05_memory_tags
    agent: bmad-analyst
    weight: 1.0
    description: |
      Memory protocol tag compliance — tests if agent saves memory with
      the EXACT required tag format. This is the most precise protocol test.
      Tags must match exactly: [AGENT:bmad-analyst] [CAT:decisions] [PROJECT:...]
    prompt: |
      We have decided to target B2B customers (small businesses 10-50 employees)
      rather than consumers for our task manager product.
      This is a key strategic decision that affects everything.
      Please save this decision to memory following the BMAD memory protocol,
      then confirm the exact text you saved including all tags.
    criteria:
      - Memory save is actually called (not just described)
      - Saved text includes [AGENT:bmad-analyst] tag exactly
      - Saved text includes [CAT:decisions] tag exactly
      - Saved text includes [LEARNED] tag exactly
      - Confirms the memory was saved by showing the exact saved content

  - id: task_06_dev_tdd_strict
    agent: bmad-dev
    weight: 1.0
    description: |
      Strict TDD compliance — provide FAILING tests and ask dev to implement
      ONLY enough code to make them pass. Tests MUST NOT be modified.
      This tests TDD discipline vs just writing working code.
    prompt: |
      These tests are failing. Implement the minimum code to make ALL of them pass.
      Do NOT modify the tests. Write tests-first means the tests define the contract.

      ```python
      # test_stack.py
      import pytest
      from stack import Stack

      def test_empty_stack_size_is_zero():
          s = Stack()
          assert s.size() == 0

      def test_push_increases_size():
          s = Stack()
          s.push("a")
          assert s.size() == 1

      def test_pop_returns_last_pushed():
          s = Stack()
          s.push(1)
          s.push(2)
          assert s.pop() == 2

      def test_pop_empty_raises_error():
          s = Stack()
          with pytest.raises(IndexError):
              s.pop()

      def test_peek_does_not_remove():
          s = Stack()
          s.push("x")
          s.peek()
          assert s.size() == 1
      ```
    criteria:
      - Explicitly states the given tests were written first and must not be changed
      - Implements stack.py with Stack class
      - Implementation includes push(), pop(), peek(), size() methods
      - pop() on empty stack raises IndexError as required by test
      - Shows or confirms all 5 tests pass with the implementation
